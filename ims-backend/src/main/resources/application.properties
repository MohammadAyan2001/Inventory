# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8081}

# ── MongoDB ───────────────────────────────────────────────────────────────────
# IMPORTANT: Set this in Render ENV, not hardcoded here
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1

spring.kafka.consumer.group-id=ims-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ims.kafka.*

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:CHANGE_THIS_SECRET}
app.jwt.expiration=86400000

# ── Tenancy ───────────────────────────────────────────────────────────────────
app.tenancy.default-tenant=${DEFAULT_TENANT:public}
app.tenancy.auto-backfill=${TENANCY_AUTO_BACKFILL:true}

# ── Cache TTLs (seconds) ──────────────────────────────────────────────────────
app.cache.product-ttl=300
app.cache.vendor-ttl=600
app.cache.warehouse-ttl=600

# ── Rate Limiting ─────────────────────────────────────────────────────────────
app.rate-limit.capacity=100
app.rate-limit.refill-tokens=100
app.rate-limit.refill-duration=60

# ── Kafka Topics ──────────────────────────────────────────────────────────────
kafka.topics.order-placed=order-placed-events
kafka.topics.inventory-update=inventory-update-events
kafka.topics.order-failed=order-failed-events

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.ims=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.data.mongodb=INFO