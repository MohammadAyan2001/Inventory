# ── Server ─────────────────────────────────────────────────────────────
server.port=${PORT:10000}

# ── MongoDB ────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# ── Disable Redis (for now) ────────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# ── Disable Kafka (for now) ────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ── JWT ────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:CHANGE_THIS_SECRET}
app.jwt.expiration=86400000

# ── Tenancy ────────────────────────────────────────────────────────────
app.tenancy.default-tenant=${DEFAULT_TENANT:public}
app.tenancy.auto-backfill=${TENANCY_AUTO_BACKFILL:true}

# ── Cache TTLs ─────────────────────────────────────────────────────────
app.cache.product-ttl=300
app.cache.vendor-ttl=600
app.cache.warehouse-ttl=600

# ── Rate Limiting ──────────────────────────────────────────────────────
app.rate-limit.capacity=100
app.rate-limit.refill-tokens=100
app.rate-limit.refill-duration=60

# ── Swagger ────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── CORS ───────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ── Logging ────────────────────────────────────────────────────────────
logging.level.com.ims=DEBUG
logging.level.org.springframework.data.mongodb=INFO