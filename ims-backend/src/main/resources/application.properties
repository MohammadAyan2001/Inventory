# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:10000}

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/ims_db}
spring.data.mongodb.auto-index-creation=true

# ── Redis (optional — set REDIS_ENABLED=true + REDIS_HOST to activate) ────────
app.redis.enabled=${REDIS_ENABLED:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ── Kafka (optional — set KAFKA_ENABLED=true + KAFKA_SERVERS to activate) ─────
app.kafka.enabled=${KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.consumer.group-id=ims-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ims.kafka.*

# ── Exclude Redis + Kafka auto-config when not enabled ────────────────────────
# Both exclusions must be in ONE property — duplicate keys are not allowed
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=86400000

# ── Cache TTLs (seconds) ──────────────────────────────────────────────────────
app.cache.product-ttl=300
app.cache.vendor-ttl=600
app.cache.warehouse-ttl=600

# ── Rate Limiting ─────────────────────────────────────────────────────────────
app.rate-limit.capacity=100
app.rate-limit.refill-tokens=100
app.rate-limit.refill-duration=60

# ── Kafka Topics ──────────────────────────────────────────────────────────────
kafka.topics.order-placed=order-placed-events
kafka.topics.inventory-update=inventory-update-events
kafka.topics.order-failed=order-failed-events

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── CORS ──────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGINS on Render to your Vercel URL, e.g.:
#   https://your-app.vercel.app,http://localhost:4200
# Use * only if you don't need cookies/credentials
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.ims=INFO
logging.level.org.springframework.data.mongodb=WARN
